policies:
  PII_IN_PROMPT:
    description: Personally identifiable information detected in the prompt sent to an LLM.
    severity: high
    detection: regex
  CREDENTIALS_IN_PROMPT:
    description: Secrets, API keys, passwords, or connection strings detected in the prompt.
    severity: critical
    detection: regex
  CREDENTIALS_IN_OUTPUT:
    description: Secrets, API keys, passwords, or connection strings detected in the model output.
    severity: critical
    detection: regex
  OFF_HOURS_USAGE:
    description: AI usage outside business hours (see business_hours block below).
    severity: low
    detection: timestamp
  BULK_DATA_EXTRACTION:
    description: Unusually large token count suggesting bulk data exfiltration.
    severity: high
    detection: token_count
    threshold: 1000

business_hours:
  start: 8
  end: 18
  # IANA timezone name (e.g. UTC, America/New_York, Europe/London).
  # Timestamps (assumed UTC) are converted to this zone before the
  # start/end window is applied. EST/EDT (or any DST) handled automatically.
  timezone: America/New_York
